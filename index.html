<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cern Basher</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        :root { --rose: #e11d48; }
        
        * { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #000;
            color: white;
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 20%, rgba(225, 29, 72, 0.12) 0%, transparent 70%);
        }
        
        .header-font { font-family: 'Space Grotesk', sans-serif; }
        .container { max-width: 672px; margin: 0 auto; padding: 0 24px; }
        
        header {
            position: sticky; top: 0; z-index: 50;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.9); backdrop-filter: blur(12px);
        }
        
        .tweet-container {
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.06);
        }
        
        .play-button { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% {opacity:1} 50% {opacity:0.7} }

        /* Stronger isolation */
        .cern-main * {
            font-family: inherit !important;
            box-sizing: border-box !important;
        }
    </style>
</head>
<body>
    <div class="cern-main">
        <!-- HEADER -->
        <header>
            <div class="container py-6 flex items-center justify-center gap-x-4">
                <img src="https://pbs.twimg.com/profile_images/624186747220570112/y9A8cVFc.jpg" alt="Cern Basher" class="w-11 h-11 rounded-2xl ring-2 ring-white/20">
                <h1 class="header-font text-4xl font-medium tracking-[-1.5px]">Cern Basher</h1>
                <div class="text-xs font-mono tracking-[2px] text-rose-400/70 hidden sm:block ml-3">TESLA • SPACEX • xAI • OPTIMUS</div>
            </div>
        </header>

        <main class="container pb-24">
            <!-- Video, X posts, etc. stay the same as before -->
            <!-- (Copy the video + tweets section from previous messages) -->

            <div class="mt-20 pt-12 border-t border-white/10">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-9 h-9 bg-gradient-to-br from-rose-500 to-rose-600 rounded-2xl flex items-center justify-center text-2xl">🤖</div>
                    <h2 class="text-3xl font-semibold tracking-tight">Talk to the Agent</h2>
                </div>
            </div>
        </main>

        <footer class="container py-12 border-t border-white/10 text-center text-xs text-white/30">
            © Cern Basher • Not financial advice • Built for <a href="https://linkfo.me" class="underline hover:text-white">Linkfo.me</a>
        </footer>
    </div>

    <!-- Linkfo script at the absolute end -->
    <script src="https://linkfo.me/embed.js"
      data-username="cern"
      data-position="bottom"
      data-color="#e11d48">
    </script>

    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>

    <script>
        function playVideo() {
            document.getElementById('video-wrapper').classList.add('hidden');
            const player = document.getElementById('video-player');
            player.classList.remove('hidden');
            player.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/zeG3aJQByWw?autoplay=1&modestbranding=1&rel=0" frameborder="0" allowfullscreen></iframe>`;
        }
    </script>
</body>
</html>
