<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cern Basher — Tesla, SpaceX, xAI, Optimus & the Elon Musk ecosystem.">
    <title>Cern Basher</title>
    
    <!-- Cache busting -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #000;
            color: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 20%, rgba(225, 29, 72, 0.12) 0%, transparent 70%);
        }
        
        .header-font { font-family: 'Space Grotesk', sans-serif; }
        
        .container { 
            max-width: 672px; 
            margin: 0 auto; 
            padding: 0 24px; 
        }
        
        header {
            position: sticky; 
            top: 0; 
            z-index: 50; 
            background: rgba(0,0,0,0.95); 
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 24px 0;
        }
        
        .tweet-container {
            background: #111;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .play-button { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% {opacity:1} 50% {opacity:0.7} }
    </style>
</head>
<body>
    <header>
        <div class="container flex items-center justify-center gap-x-4">
            <img src="https://pbs.twimg.com/profile_images/624186747220570112/y9A8cVFc.jpg" 
                 alt="Cern Basher" class="w-11 h-11 rounded-2xl ring-2 ring-white/20">
            <h1 class="header-font text-4xl font-medium tracking-[-1.5px]">Cern Basher</h1>
            <div class="text-xs font-mono tracking-[3px] text-[#e11d48] hidden sm:block">TESLA • SPACEX • xAI • OPTIMUS</div>
        </div>
    </header>

    <main class="container pb-24">
        <div class="mt-12">
            <h2 class="text-3xl font-semibold tracking-tight mb-6">Latest Video</h2>
            <div id="video-wrapper" onclick="playVideo()" 
                 class="group relative cursor-pointer rounded-3xl overflow-hidden bg-zinc-950 border border-white/10 aspect-video shadow-2xl">
                <img id="thumbnail" src="https://i.ytimg.com/vi/zeG3aJQByWw/maxresdefault.jpg" class="w-full h-full object-cover">
                <div class="play-button absolute inset-0 flex items-center justify-center bg-black/40">
                    <div class="w-20 h-20 bg-white rounded-2xl flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-rose-600 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5.14v14l11-7z"/></svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-20">
            <h2 class="text-3xl font-semibold tracking-tight mb-8">Latest on X</h2>
            <div class="space-y-6">
                <div class="tweet-container">Post 1 content here</div>
                <div class="tweet-container">Post 2 content here</div>
            </div>
        </div>

        <div class="mt-20 pt-12 border-t border-white/10">
            <h2 class="text-3xl font-semibold tracking-tight mb-6">Talk to the Agent</h2>
            <a href="https://linkfo.me/cern" target="_blank" 
               style="display:block; background:#111; padding:32px; border-radius:24px; text-align:center; color:white; text-decoration:none;">
                <span style="font-size:48px; display:block; margin-bottom:16px;">🤖</span>
                <strong style="font-size:1.4rem;">Open Cern Basher Agent</strong><br>
                <span style="color:#888;">Powered by Linkfo.me</span>
            </a>
        </div>
    </main>

    <script>
        function playVideo() {
            alert("Video would play here in full version");
        }
    </script>
</body>
</html>
